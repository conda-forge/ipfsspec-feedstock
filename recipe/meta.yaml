{% set name = "ipfsspec" %}
{% set version = "0.6.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/ipfsspec-{{ version }}.tar.gz
  sha256: 1c6c2e569560a038eaa9b8a9263d78eb00d0a7d97edbbfdeb872273d687545c0

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python >=3.8
    - pip
  run:
    - python >=3.8
    - aiohttp
    - fsspec >=0.9.0
    - requests

test:
  requires:
    - pip
  commands:
    - pip check
  imports:
    - ipfsspec

about:
  home: https://github.com/fsspec/ipfsspec
  license: MIT
  license_file: LICENSE
  summary: A readonly implementation of fsspec for IPFS

extra:
  recipe-maintainers:
    - raybellwaves
